<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ECOENERG-IA">
<meta name="theme-color" content="#00e5b4">
<title>ECOENERG-IA</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#030b14;--bg2:#040d18;--bg3:#061a2e;--bg4:#030f1f;
    --border:#0d2a42;--border2:#0d2137;
    --green:#00e5b4;--blue:#3b82f6;--purple:#8b5cf6;--amber:#f59e0b;--red:#ef4444;
    --text:#e2e8f0;--muted:#64748b;--dim:#4b6b8a;
  }
  html,body{background:var(--bg);color:var(--text);font-family:'Exo 2',monospace;min-height:100vh;overflow-x:hidden}
  ::-webkit-scrollbar{width:3px;height:3px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:.4}50%{transform:scale(2.5);opacity:0}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes glow{0%,100%{box-shadow:0 0 10px #00e5b430}50%{box-shadow:0 0 30px #00e5b460}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
  .fade-in{animation:fadeIn .4s ease forwards}
  .glow-card{animation:glow 3s ease-in-out infinite}

  /* LAYOUT */
  #app{display:flex;flex-direction:column;min-height:100vh}
  #topbar{
    background:linear-gradient(90deg,#030b14,#061426 50%,#030b14);
    border-bottom:1px solid var(--border2);
    padding:0 14px;height:52px;display:flex;align-items:center;
    justify-content:space-between;position:sticky;top:0;z-index:100
  }
  .logo{display:flex;align-items:center;gap:8px}
  .logo-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--green),var(--blue));display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
  .logo-text{font-size:16px;font-weight:900;letter-spacing:1px;background:linear-gradient(135deg,var(--green),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .logo-sub{font-size:8px;color:#2d4a63;letter-spacing:2px;font-weight:700}
  .live-badge{display:flex;align-items:center;gap:5px}
  .live-kw{font-size:13px;color:var(--green);font-weight:800}
  .live-label{font-size:9px;color:var(--dim)}
  .pulsedot{position:relative;display:inline-block;width:10px;height:10px;flex-shrink:0}
  .pulsedot::before{content:'';position:absolute;inset:0;border-radius:50%;background:var(--green);animation:pulse 1.5s ease-in-out infinite;opacity:.4}
  .pulsedot::after{content:'';position:absolute;inset:2px;border-radius:50%;background:var(--green)}

  /* NAV */
  #nav{display:flex;gap:4px;overflow-x:auto;padding:8px 12px;background:var(--bg2);border-bottom:1px solid var(--border2);scrollbar-width:none}
  #nav::-webkit-scrollbar{display:none}
  .nav-btn{padding:7px 12px;border-radius:8px;border:none;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit;letter-spacing:.5px;transition:all .2s;white-space:nowrap;background:transparent;color:var(--muted)}
  .nav-btn.active{background:linear-gradient(135deg,var(--green),#0ea5e9);color:var(--bg);box-shadow:0 0 20px #00e5b440}

  /* MAIN */
  #main{flex:1;padding:14px;max-width:800px;margin:0 auto;width:100%;padding-bottom:80px}

  /* CARDS */
  .card{background:linear-gradient(145deg,var(--bg3),var(--bg4));border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:0 4px 24px #00000060;position:relative;overflow:hidden}
  .card-title{font-size:10px;color:var(--dim);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
  .stat-val{font-size:32px;font-weight:900;color:var(--green);line-height:1}
  .stat-unit{font-size:12px;color:var(--dim);margin-left:3px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:99px;font-size:9px;font-weight:800;letter-spacing:1px}
  .section-title{font-size:17px;font-weight:800;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:7px}

  /* GAUGE */
  .gauge-wrap{position:relative;display:inline-block}
  .gauge-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .gauge-val{font-size:14px;font-weight:800}
  .gauge-lbl{font-size:7px;color:var(--dim);text-align:center}

  /* BARS */
  .bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .bar-label{font-size:10px;color:var(--muted);width:70px;flex-shrink:0;text-align:right}
  .bar-track{flex:1;height:6px;background:#0d2137;border-radius:3px;overflow:hidden}
  .bar-fill{height:100%;border-radius:3px;transition:width 1s ease}
  .bar-val{font-size:10px;color:var(--text);font-weight:700;width:36px;text-align:right;flex-shrink:0}

  /* CHART AREA */
  .chart-area{width:100%;height:160px;position:relative;overflow:hidden}
  canvas{display:block}

  /* ZONE CARDS */
  .zone-card{background:linear-gradient(145deg,var(--bg3),var(--bg4));border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .2s}
  .zone-icon{font-size:24px;width:40px;text-align:center;flex-shrink:0}
  .zone-info{flex:1;min-width:0}
  .zone-name{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .zone-meta{font-size:10px;color:var(--muted);margin-top:2px}
  .zone-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
  .zone-kw{font-size:16px;font-weight:900;color:var(--green)}

  /* SENSOR ROWS */
  .sensor-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #0d213740}
  .sensor-id{font-size:10px;color:var(--muted);font-family:'Rajdhani',monospace;font-weight:700;width:30px}
  .sensor-loc{font-size:11px;color:var(--text);flex:1;margin:0 8px}
  .sensor-type{font-size:10px;color:var(--dim);width:70px}
  .sensor-val{font-size:12px;font-weight:800;width:50px;text-align:right}

  /* INSIGHT CARDS */
  .insight-card{border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid}
  .insight-icon{font-size:20px;margin-bottom:6px}
  .insight-title{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
  .insight-msg{font-size:12px;line-height:1.5;opacity:.85}

  /* RANKING */
  .rank-row{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;background:#0d213730;margin-bottom:6px}
  .rank-num{font-size:18px;font-weight:900;width:28px;color:var(--green);text-align:center}
  .rank-course{font-size:14px;font-weight:800;flex:1}
  .rank-pts{font-size:12px;font-weight:800;color:var(--green)}

  /* TRIVIA */
  .trivia-card{background:linear-gradient(145deg,#061a2e,#030f1f);border:1px solid var(--border);border-radius:14px;padding:18px}
  .trivia-q{font-size:14px;font-weight:700;line-height:1.5;margin-bottom:14px}
  .trivia-opt{width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text);font-family:inherit;font-size:12px;cursor:pointer;text-align:left;margin-bottom:7px;transition:all .2s}
  .trivia-opt:hover{border-color:var(--green);background:#00e5b410}
  .trivia-opt.correct{background:#00e5b420;border-color:var(--green);color:var(--green)}
  .trivia-opt.wrong{background:#ef444420;border-color:var(--red);color:var(--red)}
  .trivia-ans{margin-top:10px;padding:10px;border-radius:8px;background:#00e5b410;border:1px solid #00e5b430;font-size:11px;line-height:1.5;color:var(--green);display:none}
  .trivia-ans.show{display:block;animation:fadeIn .3s ease}

  /* CHAT */
  #chat-fab{position:fixed;bottom:22px;right:18px;z-index:200}
  #chat-btn{width:50px;height:50px;border-radius:14px;background:linear-gradient(135deg,var(--green),var(--blue));border:none;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 30px #00e5b440;animation:glow 2s ease-in-out infinite}
  #chat-window{position:fixed;bottom:82px;right:14px;left:14px;max-width:380px;margin:0 auto;height:380px;background:#040f1c;border:1px solid var(--border);border-radius:16px;display:flex;flex-direction:column;box-shadow:0 20px 60px #00000080;animation:slideUp .3s ease;z-index:199}
  #chat-window.hidden{display:none}
  .chat-header{padding:10px 14px;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:8px;flex-shrink:0}
  .chat-msgs{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:7px}
  .chat-msg{max-width:82%;padding:8px 11px;border-radius:11px;font-size:11px;line-height:1.5;word-break:break-word}
  .chat-msg.ai{background:var(--bg3);border:1px solid var(--border2);align-self:flex-start}
  .chat-msg.user{background:linear-gradient(135deg,var(--green),#0ea5e9);color:var(--bg);align-self:flex-end}
  .chat-input-row{padding:8px;border-top:1px solid var(--border2);display:flex;gap:6px;flex-shrink:0}
  .chat-input{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:7px 10px;color:var(--text);font-family:inherit;font-size:11px;outline:none}
  .chat-send{background:linear-gradient(135deg,var(--green),#0ea5e9);border:none;border-radius:8px;padding:7px 12px;cursor:pointer;font-size:13px;color:var(--bg)}
  .typing-dots{display:flex;gap:4px;padding:6px}
  .dot{width:6px;height:6px;border-radius:3px;background:var(--green);animation:blink 1s ease infinite}
  .dot:nth-child(2){animation-delay:.2s}
  .dot:nth-child(3){animation-delay:.4s}

  /* LOGIN */
  #login{min-height:100vh;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
  .role-btn{width:100%;max-width:340px;padding:16px;border-radius:12px;border:1px solid var(--border);background:linear-gradient(145deg,var(--bg3),var(--bg4));cursor:pointer;font-family:inherit;color:var(--text);display:flex;align-items:center;gap:12px;margin-bottom:10px;transition:all .2s;text-align:left}
  .role-btn:hover{border-color:var(--green);background:#00e5b408}
  .role-icon{font-size:26px;width:40px;flex-shrink:0}
  .role-name{font-size:14px;font-weight:800}
  .role-desc{font-size:11px;color:var(--muted);margin-top:2px}

  /* SOLAR PANEL VISUAL */
  .solar-ring{stroke-dasharray:251;stroke-dashoffset:251;stroke-linecap:round;transition:stroke-dashoffset 1.5s ease}

  /* INSTALL BANNER */
  #install-banner{position:fixed;top:56px;left:0;right:0;background:linear-gradient(135deg,#00e5b4,#0ea5e9);color:var(--bg);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;z-index:90;font-size:12px;font-weight:700}
  #install-banner.hidden{display:none}
  .install-btn{background:var(--bg);color:var(--green);border:none;border-radius:8px;padding:5px 14px;cursor:pointer;font-weight:800;font-size:11px;font-family:inherit}

  @media(min-width:600px){
    #main{padding:18px 20px}
    .grid2{grid-template-columns:repeat(2,1fr)}
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div style="text-align:center;margin-bottom:36px;animation:fadeIn .6s ease">
    <div style="font-size:52px;margin-bottom:8px">⚡</div>
    <div style="font-size:28px;font-weight:900;background:linear-gradient(135deg,#00e5b4,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent">ECOENERG-IA</div>
    <div style="font-size:10px;color:#2d4a63;letter-spacing:4px;margin-top:4px">COLEGIO VILLAS DE SAN IGNACIO</div>
    <div style="font-size:12px;color:#4b6b8a;margin-top:8px">Dashboard de Monitoreo Energético Inteligente</div>
  </div>
  <div id="role-list"></div>
</div>

<!-- INSTALL BANNER -->
<div id="install-banner" class="hidden">
  <span>📲 Instalar ECOENERG-IA como app</span>
  <button class="install-btn" id="install-btn">Instalar</button>
</div>

<!-- APP (hidden until login) -->
<div id="app" style="display:none">
  <div id="topbar">
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div>
        <div class="logo-text">ECOENERG-IA</div>
        <div class="logo-sub">COLEGIO VILLAS DE SAN IGNACIO</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="live-badge">
        <span class="pulsedot"></span>
        <span class="live-kw" id="live-kw">103.6 kW</span>
        <span class="live-label">LIVE</span>
      </div>
      <button onclick="logout()" style="background:none;border:1px solid #1e3a52;border-radius:8px;color:var(--muted);padding:3px 9px;cursor:pointer;font-size:10px;font-family:inherit">Salir</button>
    </div>
  </div>

  <div id="nav">
    <button class="nav-btn active" onclick="setTab('dashboard')" data-tab="dashboard">⚡ Dashboard</button>
    <button class="nav-btn" onclick="setTab('zonas')" data-tab="zonas">🗺️ Zonas</button>
    <button class="nav-btn" onclick="setTab('ia')" data-tab="ia">🤖 IA & Alertas</button>
    <button class="nav-btn" onclick="setTab('solar')" data-tab="solar">☀️ Solar</button>
    <button class="nav-btn" onclick="setTab('sensores')" data-tab="sensores">📡 Sensores IoT</button>
    <button class="nav-btn" onclick="setTab('educativo')" data-tab="educativo">🌱 Eco-Retos</button>
    <button class="nav-btn" onclick="setTab('reportes')" data-tab="reportes">📊 Reportes</button>
  </div>

  <div id="main" class="fade-in"></div>
</div>

<!-- AI CHAT FAB -->
<div id="chat-fab">
  <div id="chat-window" class="hidden">
    <div class="chat-header">
      <div style="width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,#00e5b4,#3b82f6);display:flex;align-items:center;justify-content:center;font-size:13px">🤖</div>
      <div>
        <div style="font-size:11px;font-weight:800;color:var(--green)">ENERG-IA Assistant</div>
        <div style="font-size:9px;color:#2d4a63">IA • Online</div>
      </div>
      <button onclick="toggleChat()" style="margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px">✕</button>
    </div>
    <div class="chat-msgs" id="chat-msgs"></div>
    <div class="chat-input-row">
      <input class="chat-input" id="chat-input" placeholder="Pregunta sobre energía..." onkeydown="if(event.key==='Enter')sendChat()">
      <button class="chat-send" onclick="sendChat()">➤</button>
    </div>
  </div>
  <button id="chat-btn" class="glow-card" onclick="toggleChat()">🤖</button>
</div>

<script>
// ── DATA ────────────────────────────────────────────────────────────────────
const ZONES = [
  {id:1,name:"Bloque A - Primaria",kW:18.4,status:"normal",sensors:12,efficiency:87,icon:"🏫"},
  {id:2,name:"Bloque B - Secundaria",kW:24.1,status:"warning",sensors:14,efficiency:71,icon:"📚"},
  {id:3,name:"Laboratorios STEM",kW:31.7,status:"alert",sensors:8,efficiency:58,icon:"🔬"},
  {id:4,name:"Auditorio",kW:8.2,status:"normal",sensors:6,efficiency:92,icon:"🎭"},
  {id:5,name:"Cafetería",kW:14.9,status:"normal",sensors:5,efficiency:83,icon:"🍽️"},
  {id:6,name:"Zonas Comunes",kW:6.3,status:"normal",sensors:9,efficiency:95,icon:"🌿"},
];
const SENSORS = [
  {id:"S01",loc:"Lab Física",type:"Corriente",val:"12.4A",ok:true},
  {id:"S02",loc:"Sala Cómputo",type:"Temperatura",val:"23°C",ok:true},
  {id:"S03",loc:"Bloque B P2",type:"Iluminación",val:"450lx",ok:false},
  {id:"S04",loc:"Cafetería",type:"Movimiento",val:"Activo",ok:true},
  {id:"S05",loc:"Auditorio",type:"Corriente",val:"8.1A",ok:true},
  {id:"S06",loc:"Dirección",type:"Temperatura",val:"26°C",ok:false},
];
const RANKING = [
  {rank:1,curso:"11°A",ahorro:94,pts:1240,medal:"🥇"},
  {rank:2,curso:"10°B",ahorro:89,pts:1180,medal:"🥈"},
  {rank:3,curso:"9°C",ahorro:85,pts:1050,medal:"🥉"},
  {rank:4,curso:"8°A",ahorro:78,pts:920,medal:""},
  {rank:5,curso:"7°B",ahorro:72,pts:860,medal:""},
];
const INSIGHTS = [
  {type:"prediccion",icon:"🔮",title:"Predicción de Factura",msg:"Este mes: $1.247.000 COP. Ahorro proyectado: 18% vs mes anterior.",color:"#3b82f6"},
  {type:"anomalia",icon:"⚠️",title:"Anomalía Detectada",msg:"Lab. Física: consumo 42% superior al promedio histórico los viernes.",color:"#f59e0b"},
  {type:"recomend",icon:"💡",title:"Recomendación IA",msg:"Apagar luces del Bloque B entre 12-1pm reduciría 8.3 kWh/día.",color:"#00e5b4"},
  {type:"logro",icon:"🏆",title:"Meta Alcanzada",msg:"Semana con menor consumo en el año. ¡Comunidad Villas lo logró!",color:"#a855f7"},
];
const TRIVIA = [
  {q:"¿Cuántos kWh ahorra un LED vs bombilla incandescente?",a:"Un LED ahorra hasta un 80% de energía. ¡Cambia todas las bombillas del colegio! 💡",opts:["60%","80%","40%","90%"],correct:1},
  {q:"¿Qué es la huella de carbono?",a:"La cantidad total de gases de efecto invernadero emitidos por nuestras actividades. 🌍",opts:["Un tipo de planta","Emisiones de CO₂","Energía solar","Un sensor"],correct:1},
  {q:"¿Qué significa IoT?",a:"Internet of Things — dispositivos físicos conectados a internet que intercambian datos. 📡",opts:["Index of Temperature","Internet of Things","Input Output Tech","Integrated Open Tools"],correct:1},
];
const PIEDATA = [
  {name:"Iluminación",value:34,color:"#00e5b4"},
  {name:"Computadores",value:28,color:"#3b82f6"},
  {name:"Climatización",value:22,color:"#8b5cf6"},
  {name:"Lab. Equipos",value:11,color:"#f59e0b"},
  {name:"Otros",value:5,color:"#6b7280"},
];
const HOURLY = [12,28,65,82,74,79,58,43,71,68,52,31];
const HOURLY_PREV = [18,32,78,91,88,95,72,61,84,79,67,44];
const WEEKLY = [420,385,460,398,441,180,95];
const WEEKLY_SOLAR = [95,112,88,130,105,145,160];
const WEEK_LABELS = ["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];

// ── STATE ───────────────────────────────────────────────────────────────────
let role = null;
let liveKW = 103.6;
let tab = "dashboard";
let triviaIdx = 0;
let chatOpen = false;
let chatMsgs = [{from:"ai",text:"¡Hola! Soy ENERG-IA, tu asistente inteligente. ¿En qué puedo ayudarte hoy? 🌱"}];
let deferredPrompt = null;

// ── SERVICE WORKER ───────────────────────────────────────────────────────────
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

// ── PWA INSTALL ──────────────────────────────────────────────────────────────
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').classList.remove('hidden');
});
document.getElementById('install-btn').addEventListener('click', async () => {
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  const {outcome} = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('install-banner').classList.add('hidden');
});
window.addEventListener('appinstalled', () => {
  document.getElementById('install-banner').classList.add('hidden');
});

// ── LIVE KW ──────────────────────────────────────────────────────────────────
setInterval(() => {
  liveKW = +(liveKW + (Math.random()-.5)*1.5).toFixed(1);
  const el = document.getElementById('live-kw');
  if(el) el.textContent = liveKW + ' kW';
  const kw2 = document.getElementById('kw-main');
  if(kw2) kw2.textContent = liveKW;
}, 2000);

// ── LOGIN ────────────────────────────────────────────────────────────────────
const ROLES = [
  {id:"admin",label:"Administrador",icon:"👤",desc:"Acceso total al sistema"},

// ── GAUGE SVG ────────────────────────────────────────────────────────────────
function gaugeHTML(value, size=80, color='#00e5b4', label='') {
  const r = (size-10)/2;
  const circ = 2*Math.PI*r;
  const offset = circ - (value/100)*circ;
  return `<div class="gauge-wrap" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#1e293b" stroke-width="6"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="6"
        stroke-dasharray="${circ}" stroke-dashoffset="${offset}"
        stroke-linecap="round" transform="rotate(-90 ${size/2} ${size/2})" style="transition:stroke-dashoffset 1s ease"/>
    </svg>
    <div class="gauge-inner">
      <span class="gauge-val" style="color:${color}">${value}%</span>
      ${label ? `<span class="gauge-lbl">${label}</span>` : ''}
    </div>
  </div>`;
}

function statusColor(s){return{normal:'#00e5b4',warning:'#f59e0b',alert:'#ef4444'}[s]}
function statusLabel(s){return{normal:'Óptimo',warning:'Moderado',alert:'Alerta'}[s]}

// ── MINI SPARKLINE ───────────────────────────────────────────────────────────
function sparklineHTML(val) {
  const pts = Array.from({length:12},(_,i)=>Math.max(20,val+Math.sin(i*.9)*15+(Math.random()-.5)*10));
  const mx=Math.max(...pts),mn=Math.min(...pts);
  const n=pts.map(p=>((p-mn)/(mx-mn))*28);
  const d=n.map((y,i)=>(i===0?'M':'L')+(i*9)+','+(28-y)).join(' ');
  return `<svg width="100" height="30" style="opacity:.7"><path d="${d}" fill="none" stroke="#00e5b4" stroke-width="1.5"/></svg>`;
}

// ── CANVAS CHART HELPERS ──────────────────────────────────────────────────────
function drawLineChart(id, data1, data2, labels, h=150) {
  const canvas = document.getElementById(id);
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth||canvas.width;
  canvas.width = W; canvas.height = h;
  ctx.clearRect(0,0,W,h);
  const pad = {l:10,r:10,t:10,b:28};
  const cw = W-pad.l-pad.r, ch = h-pad.t-pad.b;
  const all = [...data1,...(data2||[])];
  const mn = Math.min(...all)*0.9, mx = Math.max(...all)*1.05;
  function px(i,d){return pad.l + (i/(data1.length-1))*cw + (d&&i===data1.length-1?-2:0)}
  function py(v){return pad.t + ch - ((v-mn)/(mx-mn))*ch}
  // grid
  ctx.strokeStyle = '#0d213760'; ctx.lineWidth = 1;
  for(let i=0;i<4;i++){const y=pad.t+ch*(i/3);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();}
  // area fill data1
  ctx.beginPath();
  data1.forEach((v,i)=>i===0?ctx.moveTo(px(i),py(v)):ctx.lineTo(px(i),py(v)));
  ctx.lineTo(px(data1.length-1),pad.t+ch); ctx.lineTo(pad.l,pad.t+ch); ctx.closePath();
  const grad=ctx.createLinearGradient(0,pad.t,0,pad.t+ch);
  grad.addColorStop(0,'#00e5b430'); grad.addColorStop(1,'#00e5b400');
  ctx.fillStyle=grad; ctx.fill();
  // line data1
  ctx.beginPath();
  data1.forEach((v,i)=>i===0?ctx.moveTo(px(i),py(v)):ctx.lineTo(px(i),py(v)));
  ctx.strokeStyle='#00e5b4'; ctx.lineWidth=2; ctx.stroke();
  // line data2
  if(data2){
    ctx.beginPath();
    data2.forEach((v,i)=>i===0?ctx.moveTo(px(i),py(v)):ctx.lineTo(px(i),py(v)));
    ctx.strokeStyle='#3b82f6'; ctx.lineWidth=1.5; ctx.setLineDash([4,3]); ctx.stroke(); ctx.setLineDash([]);
  }
  // labels
  ctx.fillStyle='#4b6b8a'; ctx.font='9px Exo 2,monospace'; ctx.textAlign='center';
  labels.forEach((l,i)=>ctx.fillText(l,px(i),h-5));
}

function drawBarChart(id, data, labels, colors, h=150) {
  const canvas = document.getElementById(id);
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth||canvas.width;
  canvas.width = W; canvas.height = h;
  ctx.clearRect(0,0,W,h);
  const pad = {l:10,r:10,t:10,b:28};
  const cw = W-pad.l-pad.r, ch = h-pad.t-pad.b;
  const mx = Math.max(...data)*1.05;
  const bw = (cw/data.length)*0.6;
  const gap = cw/data.length;
  // grid
  ctx.strokeStyle='#0d213760'; ctx.lineWidth=1;
  for(let i=0;i<3;i++){const y=pad.t+ch*(i/2);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();}
  data.forEach((v,i)=>{
    const x = pad.l + gap*i + gap/2 - bw/2;
    const bh = (v/mx)*ch;
    const y = pad.t + ch - bh;
    const g = ctx.createLinearGradient(0,y,0,y+bh);
    const c = Array.isArray(colors)?colors[i%colors.length]:colors;
    g.addColorStop(0,c+'cc'); g.addColorStop(1,c+'44');
    ctx.fillStyle=g;
    ctx.beginPath();
    ctx.roundRect(x,y,bw,bh,3);
    ctx.fill();
  });
  ctx.fillStyle='#4b6b8a'; ctx.font='9px Exo 2,monospace'; ctx.textAlign='center';
  labels.forEach((l,i)=>ctx.fillText(l,pad.l+gap*i+gap/2,h-5));
}

function drawDonut(id, data, h=160) {
  const canvas = document.getElementById(id);
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = Math.min(canvas.offsetWidth||200, 200);
  canvas.width = W; canvas.height = h;
  ctx.clearRect(0,0,W,h);
  const cx = W/2, cy = h/2, r = Math.min(cx,cy)-16, ri = r*0.6;
  const total = data.reduce((s,d)=>s+d.value,0);
  let angle = -Math.PI/2;
  data.forEach(d => {
    const sweep = (d.value/total)*2*Math.PI;
    ctx.beginPath();
    ctx.arc(cx,cy,r,angle,angle+sweep);
    ctx.arc(cx,cy,ri,angle+sweep,angle,true);
    ctx.closePath();
    ctx.fillStyle = d.color;
    ctx.fill();
    angle += sweep;
  });
  // center text
  ctx.fillStyle='#e2e8f0'; ctx.font='bold 14px Exo 2,monospace'; ctx.textAlign='center';
  ctx.fillText('103.6',cx,cy+2);
  ctx.fillStyle='#4b6b8a'; ctx.font='9px Exo 2,monospace';
  ctx.fillText('kW Total',cx,cy+14);
}

    ${t.opts.map((o,i)=>`<button class="trivia-opt" id="opt-${i}" onclick="answerTrivia(${i},${t.correct})">${o}</button>`).join('')}
    <div class="trivia-ans" id="trivia-ans">${t.a}</div>
    <div style="display:flex;justify-content:flex-end;margin-top:10px">
      <button onclick="nextTrivia()" style="background:linear-gradient(135deg,#00e5b4,#0ea5e9);border:none;border-radius:8px;padding:8px 18px;color:#030b14;font-weight:800;font-size:11px;cursor:pointer;font-family:inherit">Siguiente →</button>
    </div>
  </div>`;
}

function answerTrivia(selected, correct) {
  document.querySelectorAll('.trivia-opt').forEach((b,i)=>{
    b.disabled = true;
    if(i===correct) b.classList.add('correct');
    else if(i===selected&&i!==correct) b.classList.add('wrong');
  });
  const ans = document.getElementById('trivia-ans');
  if(ans) {ans.classList.add('show');}
}
function nextTrivia() {
  triviaIdx = (triviaIdx+1)%TRIVIA.length;
  setTab('educativo');
}

// ── CHAT ─────────────────────────────────────────────────────────────────────
function initChat() {
  renderChatMsgs();
}
function toggleChat() {
  chatOpen = !chatOpen;
  document.getElementById('chat-window').classList.toggle('hidden', !chatOpen);
  if(chatOpen) renderChatMsgs();
}
function renderChatMsgs() {
  const el = document.getElementById('chat-msgs');
  if(!el) return;
  el.innerHTML = chatMsgs.map(m=>`<div class="chat-msg ${m.from}">${m.text}</div>`).join('');
  el.scrollTop = el.scrollHeight;
}
async function sendChat() {
  const input = document.getElementById('chat-input');
  if(!input||!input.value.trim()) return;
  const userMsg = input.value.trim();
  input.value = '';
  chatMsgs.push({from:'user',text:userMsg});
  renderChatMsgs();
  // typing indicator
  const el = document.getElementById('chat-msgs');
  if(el) {
    const typing = document.createElement('div');
    typing.id='typing';
    typing.innerHTML='<div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    el.appendChild(typing);
    el.scrollTop = el.scrollHeight;
  }
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:`Eres ENERG-IA, el asistente virtual inteligente del dashboard ECOENERG-IA del Colegio Villas de San Ignacio. 
Tu rol: responder preguntas sobre consumo energético, sostenibilidad, energías renovables, eficiencia eléctrica y datos del dashboard.
Contexto: El colegio consume actualmente ${liveKW} kW totales. Eficiencia global: 81%. Ahorro vs mes anterior: 18%.
Sé amigable, educativo y motiva el ahorro energético. Responde en español, máximo 3 oraciones cortas. Usa emojis relevantes.`,
        messages:[{role:'user',content:userMsg}]
      })
    });
    const data = await res.json();
    const reply = data.content?.map(c=>c.text).join('')||'No pude procesar tu consulta.';
    chatMsgs.push({from:'ai',text:reply});
  } catch {
    chatMsgs.push({from:'ai',text:'Conexión no disponible en este momento. ¡Intenta de nuevo! 🔌'});
  }
  const typing = document.getElementById('typing');
  if(typing) typing.remove();
  renderChatMsgs();
}
